name: Android Signed AAB

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/hastane-keystore.jks
          cp android/app/hastane-keystore.jks android/hastane-keystore.jks
          echo "=== Keystore files ==="
          ls -la android/app/hastane-keystore.jks
          ls -la android/hastane-keystore.jks
          echo "=== Keystore info ==="
          keytool -list -v -keystore android/app/hastane-keystore.jks -storepass "${{ secrets.KEYSTORE_PASSWORD }}" -keypass "${{ secrets.KEY_PASSWORD }}"

      - name: Create key.properties
        run: |
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=%s\n' \
            "${{ secrets.KEYSTORE_PASSWORD }}" \
            "${{ secrets.KEY_PASSWORD }}" \
            "${{ secrets.KEY_ALIAS }}" \
            "hastane-keystore.jks" \
            > android/key.properties
          echo "=== key.properties ==="
          cat android/key.properties

      - name: Verify files
        run: |
          echo "=== android/ directory ==="
          ls -la android/
          echo "=== android/app/ directory ==="
          ls -la android/app/
          echo "=== key.properties content ==="
          cat android/key.properties
          echo "=== build.gradle signing config ==="
          grep -A 20 "signingConfigs" android/app/build.gradle

      - name: Flutter pub get
        run: flutter pub get

      - name: Build AAB (Play Store)
        run: flutter build appbundle --release --verbose

      - name: Build APK (direct install)
        run: flutter build apk --release

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: hastane-uygulama-aab
          path: build/app/outputs/bundle/release/app-release.aab

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: hastane-uygulama-apk
          path: build/app/outputs/flutter-apk/app-release.apk