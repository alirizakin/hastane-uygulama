name: Android Signed AAB

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/hastane-keystore.jks

      - name: Create key.properties
        run: |
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=%s\n' \
            "${{ secrets.KEYSTORE_PASSWORD }}" \
            "${{ secrets.KEY_PASSWORD }}" \
            "${{ secrets.KEY_ALIAS }}" \
            "hastane-keystore.jks" \
            > android/key.properties

      - name: Flutter pub get
        run: flutter pub get

      - name: Build AAB (Play Store)
        run: flutter build appbundle --release

      - name: Build APK (direct install)
        run: flutter build apk --release

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: hastane-uygulama-aab
          path: build/app/outputs/bundle/release/app-release.aab

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: hastane-uygulama-apk
          path: build/app/outputs/flutter-apk/app-release.apk