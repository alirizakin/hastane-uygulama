name: Aylık Yemek Menüsü Güncelleme

on:
  schedule:
    - cron: '0 4 1 * *'         # her ayın 1'i 04:00 UTC (07:00 TR)
  workflow_dispatch:             # manuel tetikleme

permissions:
  contents: write

jobs:
  update-menu:
    runs-on: ubuntu-latest
    steps:
      - name: Repo'yu çek
        uses: actions/checkout@v4

      - name: Python bağımlılıkları
        run: pip install requests openpyxl

      - name: Menüyü indir ve JSON üret
        run: python3 scripts/update_menu.py

      - name: Değişiklikleri commit ve push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/yemek_listesi.xlsx data/menu.json
          if git diff --cached --quiet; then
            echo "Değişiklik yok."
          else
            git commit -m "Menü güncellendi - $(date +'%Y-%m-%d')"
            git push
          fi