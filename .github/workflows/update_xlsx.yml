name: Aylık Yemek Listesi Güncelleme

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-menu:
    runs-on: ubuntu-latest
    steps:
      - name: Repo'yu çek
        uses: actions/checkout@v4

      - name: Mevcut xlsx bağlantısını bul ve indir
        run: python3 scripts/update_menu.py

      - name: Değişiklikleri kontrol et ve push et
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/yemek_listesi.xlsx
          if git diff --cached --quiet; then
            echo "Değişiklik yok."
          else
            git commit -m "Aylık yemek listesi güncellendi - $(date +'%Y-%m-%d')"
            git push
          fi
