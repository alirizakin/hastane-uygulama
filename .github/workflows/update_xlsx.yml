name: Aylık Yemek Listesi Güncelleme

on:
  schedule:
    - cron: '0 0 1 * *'   # Her ayın 1'i saat 00:00 UTC
  workflow_dispatch:      # Manuel çalıştırmaya izin ver

permissions:
  contents: write

jobs:
  update-menu:
    runs-on: ubuntu-latest
    steps:
      - name: Repo'yu çek
        uses: actions/checkout@v4

      - name: Mevcut xlsx dosyasını indir (SİTE)
        run: |
          mkdir -p data
          curl -L -f -o data/yemek_listesi.xlsx \
            "https://ispartasehir.saglik.gov.tr/TR-471595/yemek-listesi.html" \
            || echo "İndirme başarısız, dosya değişmedi."

      - name: Değişiklikleri kontrol et ve push et
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/yemek_listesi.xlsx
          if git diff --cached --quiet; then
            echo "Değişiklik yok."
          else
            git commit -m "Aylık yemek listesi güncellendi - $(date +'%Y-%m-%d')"
            git push
          fi
